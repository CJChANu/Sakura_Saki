server:
  port: 9090

spring:
  application:
    name: SakuraSaki

  datasource:
    url: jdbc:mysql://localhost:3306/sakura_saki
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  thymeleaf:
    cache: false