<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/fragments :: head('Customer Management — Sakura Saki Admin')}"></head>
<body class="bg-surface text-on-surface font-body">
<th:block th:replace="~{layout/fragments :: sakura-canvas}" />

<div class="flex min-h-screen w-full relative z-10 md:pl-72">
    <!-- Sidebar -->
    <aside th:replace="~{layout/fragments :: admin-sidebar('customers')}"></aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-10 lg:p-14 relative flex flex-col">
        <!-- Page Header -->
        <header class="flex justify-between items-end mb-12 flex-wrap gap-4">
            <div>
                <span class="text-primary font-label text-xs font-bold tracking-[0.2em] uppercase block mb-2">Customer Management</span>
                <h1 class="font-headline text-4xl text-tertiary font-bold">All Customers</h1>
            </div>
            <div class="flex items-center gap-4 flex-wrap">
                <form th:action="@{/admin/customers}" method="get" class="flex items-center">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
                        <input type="text" name="search" th:value="${search}" class="pl-12 pr-4 py-3 rounded-full bg-surface-container-high border-none font-body text-sm text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/30 w-64 shadow-inner" placeholder="Search by username...">
                    </div>
                </form>
            </div>
        </header>

        <!-- Alerts -->
        <div th:if="${success}" class="mb-6 p-4 rounded-2xl bg-tertiary-container/30 border border-tertiary-container text-tertiary-fixed-variant font-body text-sm flex items-center gap-3">
            <span class="material-symbols-outlined">check_circle</span> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="mb-6 p-4 rounded-2xl bg-error-container/30 border border-error-container text-on-error-container font-body text-sm flex items-center gap-3">
            <span class="material-symbols-outlined">error</span> <span th:text="${error}"></span>
        </div>

        <!-- Content List -->
        <div class="glass-pane bg-surface-container-lowest rounded-[2rem] p-6 lg:p-8 clay-lift border border-outline-variant/30 flex-1 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-headline text-xl font-bold text-tertiary">
                    <span th:text="${#lists.size(customers)}">0</span> customers found
                </h3>
                <a th:if="${search != null && !search.isEmpty()}" th:href="@{/admin/customers}" class="bg-surface-container text-on-surface px-4 py-2 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-surface-container-high transition-colors flex items-center gap-1 shadow-sm" style="text-decoration:none;">
                    <span class="material-symbols-outlined text-sm">close</span> Clear Search
                </a>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[900px]">
                    <thead>
                        <tr class="border-b border-outline-variant/30">
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Customer</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Email</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Phone</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Joined</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Status</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${customers}" class="border-b border-outline-variant/10 hover:bg-surface-container-low/50 transition-colors group">
                            <td class="py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-xs shadow-sm"
                                         th:text="${#strings.toUpperCase(#strings.substring(c.username, 0, 2))}">US</div>
                                    <div>
                                        <p class="font-body font-bold text-sm text-on-surface" th:text="${c.fullName}">Full Name</p>
                                        <p class="font-body text-[11px] text-outline mt-0.5">@<span th:text="${c.username}">username</span></p>
                                    </div>
                                </div>
                            </td>
                            <td class="py-4 font-body text-sm text-on-surface-variant" th:text="${c.email}">user@mail.com</td>
                            <td class="py-4 font-body text-sm text-on-surface-variant" th:text="${c.phone != null ? c.phone : '—'}">—</td>
                            <td class="py-4 font-body text-sm text-outline" th:text="${#temporals.format(c.createdAt, 'dd MMM yyyy')}">01 Jan 2024</td>
                            <td class="py-4">
                                <span class="px-3 py-1 rounded-full font-label text-[10px] font-bold uppercase tracking-wider"
                                      th:classappend="${c.enabled} ? 'bg-tertiary-container/30 text-tertiary-fixed-variant' : 'bg-surface-container text-outline'"
                                      th:text="${c.enabled ? 'Active' : 'Disabled'}">Active</span>
                            </td>
                            <td class="py-4 text-right">
                                <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <form th:if="${c.enabled}" th:action="@{'/admin/customers/' + ${c.id} + '/deactivate'}" method="post" onsubmit="return confirm('Deactivate this customer?')">
                                        <button type="submit" class="bg-surface-container hover:bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label text-[10px] font-bold uppercase tracking-wider transition-colors flex items-center gap-1 shadow-sm" title="Deactivate this customer">
                                            <span class="material-symbols-outlined text-sm">person_off</span> Deactivate
                                        </button>
                                    </form>
                                    <form th:if="${!c.enabled}" th:action="@{'/admin/customers/' + ${c.id} + '/activate'}" method="post">
                                        <button type="submit" class="bg-primary-container hover:bg-primary-fixed text-on-primary-container px-4 py-2 rounded-full font-label text-[10px] font-bold uppercase tracking-wider transition-colors flex items-center gap-1 shadow-sm" title="Activate this customer">
                                            <span class="material-symbols-outlined text-sm">person_check</span> Activate
                                        </button>
                                    </form>
                                    <form th:action="@{'/admin/customers/' + ${c.id} + '/delete'}" method="post" onsubmit="return confirm('Permanently delete this customer? (Only allowed if there are no existing appointments)')">
                                        <button type="submit" class="w-8 h-8 rounded-full bg-error-container/20 hover:bg-error-container text-on-error-container flex items-center justify-center transition-colors shadow-sm" title="Permanently delete">
                                            <span class="material-symbols-outlined text-sm">delete_forever</span>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(customers)}">
                            <td colspan="6" class="py-16 text-center">
                                <span class="material-symbols-outlined text-5xl text-outline mb-2 block opacity-30">person_off</span>
                                <p class="text-on-surface-variant font-body text-sm">No customers found.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        
    </main>
</div>

<footer th:replace="~{layout/fragments :: dashboard-footer}"></footer>

<th:block th:replace="~{layout/fragments :: sakura-js}" />
</body>
</html>
