<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/fragments :: head('Services — Sakura Saki Admin')}"></head>
<body class="bg-surface text-on-surface font-body">
<th:block th:replace="~{layout/fragments :: sakura-canvas}" />

<div class="flex min-h-screen w-full relative z-10 md:pl-72">
    <!-- Sidebar -->
    <aside th:replace="~{layout/fragments :: admin-sidebar('services')}"></aside>

    <!-- Main Content -->
    <main class="flex-1 px-6 pt-6 md:px-10 pt-10 lg:px-14 pt-14 relative flex flex-col pb-2">
        <!-- Page Header -->
        <header class="flex justify-between items-end mb-12 flex-wrap gap-4">
            <div>
                <span class="text-primary font-label text-xs font-bold tracking-[0.2em] uppercase block mb-2">Manage</span>
                <h1 class="font-headline text-4xl text-tertiary font-bold">Salon Services</h1>
            </div>
            <div class="flex items-center gap-4 flex-wrap">
                <form th:action="@{/admin/services}" method="get" class="flex items-center gap-3">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
                        <input type="text" name="name" class="pl-12 pr-4 py-3 rounded-full bg-surface-container-high border-none font-body text-sm text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/30 w-48 shadow-inner" placeholder="Search name...">
                    </div>
                    <select name="category" class="px-6 py-3 rounded-full bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner">
                        <option value="">All Categories</option>
                        <option value="Hair">Hair</option>
                        <option value="Skin">Skin</option>
                        <option value="Nails">Nails</option>
                        <option value="Bridal">Bridal</option>
                        <option value="Spa">Spa</option>
                    </select>
                    <button type="submit" class="bg-surface-container text-on-surface px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-surface-container-high transition-colors flex items-center gap-2 shadow-sm">
                        <span class="material-symbols-outlined text-sm">filter_list</span> Filter
                    </button>
                </form>
                <button data-modal-target="createModal" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors flex items-center gap-2 shadow-md">
                    <span class="material-symbols-outlined text-sm">add</span> Add Service
                </button>
            </div>
        </header>

        <!-- Alerts -->
        <div th:if="${success}" class="mb-6 p-4 rounded-2xl bg-tertiary-container/30 border border-tertiary-container text-tertiary-fixed-variant font-body text-sm flex items-center gap-3">
            <span class="material-symbols-outlined">check_circle</span> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="mb-6 p-4 rounded-2xl bg-error-container/30 border border-error-container text-on-error-container font-body text-sm flex items-center gap-3">
            <span class="material-symbols-outlined">error</span> <span th:text="${error}"></span>
        </div>

        <!-- Content List -->
        <div class="glass-pane bg-surface-container-lowest rounded-[2rem] p-6 lg:p-8 clay-lift border border-outline-variant/30 flex-1">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-outline-variant/30">
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider w-16">Image</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Name</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Category</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Duration</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Price</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Status</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${services.content}" class="border-b border-outline-variant/10 hover:bg-surface-container-low/50 transition-colors group">
                            <td class="py-4">
                                <div class="w-10 h-10 rounded overflow-hidden bg-surface-container-high border border-outline-variant/30 flex items-center justify-center">
                                    <img th:if="${s.imageUrl != null and !s.imageUrl.isEmpty()}" th:src="${s.imageUrl}" class="w-full h-full object-cover">
                                    <span th:unless="${s.imageUrl != null and !s.imageUrl.isEmpty()}" class="material-symbols-outlined text-outline-variant text-sm">image</span>
                                </div>
                            </td>
                            <td class="py-4">
                                <p class="font-body font-bold text-sm text-on-surface" th:text="${s.name}">Service</p>
                            </td>
                            <td class="py-4">
                                <span class="px-3 py-1 bg-surface-container-high rounded-full font-label text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="${s.category ?: 'General'}">Cat</span>
                            </td>
                            <td class="py-4 font-body text-sm text-on-surface-variant" th:text="${s.durationMinutes} + ' min'">30 min</td>
                            <td class="py-4 font-body font-semibold text-sm text-on-surface" th:text="'$' + ${#numbers.formatDecimal(s.price,1,2)}">$0</td>
                            <td class="py-4">
                                <span class="px-3 py-1 rounded-full font-label text-[10px] font-bold uppercase tracking-wider"
                                      th:classappend="${s.active} ? 'bg-tertiary-container/30 text-tertiary-fixed-variant' : 'bg-surface-container text-outline'"
                                      th:text="${s.active ? 'Active' : 'Inactive'}">Active</span>
                            </td>
                            <td class="py-4 text-right">
                                <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button th:data-modal-target="'editModal' + ${s.id}" class="w-8 h-8 rounded-full bg-surface-container hover:bg-surface-container-high text-on-surface flex items-center justify-center transition-colors">
                                        <span class="material-symbols-outlined text-sm">edit</span>
                                    </button>
                                    <form th:action="@{'/admin/services/' + ${s.id} + '/toggle-active'}" method="post">
                                        <button type="submit" class="w-8 h-8 rounded-full bg-surface-container hover:bg-surface-container-high text-on-surface flex items-center justify-center transition-colors" th:title="${s.active} ? 'Disable' : 'Enable'">
                                            <span class="material-symbols-outlined text-sm" th:text="${s.active} ? 'block' : 'check_circle'"></span>
                                        </button>
                                    </form>
                                    <form th:action="@{'/admin/services/' + ${s.id} + '/delete'}" method="post" onsubmit="return confirm('Are you sure you want to delete this service?');">
                                        <button type="submit" class="w-8 h-8 rounded-full bg-error-container/20 hover:bg-error-container text-on-error-container flex items-center justify-center transition-colors">
                                            <span class="material-symbols-outlined text-sm">delete</span>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${services.empty}">
                            <td colspan="6" class="py-12 text-center text-on-surface-variant font-body text-sm">No services found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <th:block th:replace="~{layout/fragments :: pagination-controls(page=${services}, url='/admin/services')}" />
        </div>

        <!-- Footer -->
        
<footer th:replace="~{layout/fragments :: dashboard-footer}"></footer>
    </main>
</div>

<!-- Custom Create Modal -->
<div id="createModal" class="sakura-modal hidden fixed inset-0 z-[100] items-center justify-center bg-on-surface/20 backdrop-blur-sm transition-all duration-300">
    <div class="modal-content bg-surface-container-lowest w-full max-w-lg rounded-[2rem] shadow-2xl p-8 scale-95 opacity-0 transition-all duration-300 transform border border-outline-variant/30">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-headline text-2xl font-bold text-tertiary">Add Service</h3>
            <button data-modal-close class="text-outline hover:text-on-surface transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form th:action="@{/admin/services/create}" method="post" enctype="multipart/form-data">
            <div class="space-y-4">
                <div>
                    <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Service Name</label>
                    <input name="name" type="text" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" placeholder="e.g. Signature Facial" th:value="${prevName}" required>
                </div>
                <div>
                    <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Description</label>
                    <textarea name="description" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner resize-none h-24" placeholder="Brief description of the service" th:text="${prevDescription}" required></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Price ($)</label>
                        <input name="price" type="number" step="0.01" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" placeholder="0.00" th:value="${prevPrice}" required>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Duration (mins)</label>
                        <input name="durationMinutes" type="number" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" placeholder="60" th:value="${prevDuration}" required>
                    </div>
                </div>
                <div>
                    <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Category</label>
                    <input name="category" type="text" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" placeholder="e.g. Hair, Skincare" th:value="${prevCategory}">
                </div>
                <div>
                    <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Image File (Optional)</label>
                    <input name="imageFile" type="file" accept="image/*" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner">
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button type="button" data-modal-close class="px-6 py-3 rounded-full font-label text-xs font-bold text-on-surface uppercase tracking-wider hover:bg-surface-container transition-colors">Cancel</button>
                <button type="submit" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors shadow-md">Create</button>
            </div>
        </form>
    </div>
</div>

<!-- Custom Edit Modals -->
<th:block th:each="s : ${services}">
    <div th:id="'editModal' + ${s.id}" class="sakura-modal hidden fixed inset-0 z-[100] items-center justify-center bg-on-surface/20 backdrop-blur-sm transition-all duration-300">
        <div class="modal-content bg-surface-container-lowest w-full max-w-lg rounded-[2rem] shadow-2xl p-8 scale-95 opacity-0 transition-all duration-300 transform border border-outline-variant/30">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-headline text-2xl font-bold text-tertiary">Edit Service</h3>
                <button data-modal-close class="text-outline hover:text-on-surface transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form th:action="@{'/admin/services/' + ${s.id} + '/update'}" method="post" enctype="multipart/form-data">
                <div class="space-y-4">
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Name</label>
                        <input name="name" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${s.name}" required>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Description</label>
                        <textarea name="description" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" rows="2" th:text="${s.description}"></textarea>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Category</label>
                        <select name="category" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner">
                            <option th:each="c : ${ {'Hair','Skin','Nails','Bridal','Spa'} }" th:value="${c}" th:text="${c}" th:selected="${c == s.category}">Cat</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Price ($)</label>
                            <input name="price" type="number" step="0.01" min="0.01" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${s.price}" required>
                        </div>
                        <div>
                            <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Duration (min)</label>
                            <input name="durationMinutes" type="number" min="15" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${s.durationMinutes}" required>
                        </div>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Current Image</label>
                        <div th:if="${s.imageUrl != null and !s.imageUrl.isEmpty()}" class="mb-2">
                            <img th:src="${s.imageUrl}" class="h-20 w-auto rounded border border-outline-variant/30">
                        </div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Upload New Image (Optional)</label>
                        <input name="imageFile" type="file" accept="image/*" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner">
                        <p class="text-xs text-outline mt-1">Leave empty to keep the current image.</p>
                    </div>
                </div>
                <div class="mt-8 flex justify-end gap-3">
                    <button type="button" data-modal-close class="px-6 py-3 rounded-full font-label text-xs font-bold text-on-surface uppercase tracking-wider hover:bg-surface-container transition-colors">Cancel</button>
                    <button type="submit" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors shadow-md">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</th:block>

<th:block th:replace="~{layout/fragments :: sakura-js}" />
<script th:if="${openModal}">
    document.addEventListener('DOMContentLoaded', () => {
        const modalId = '[[${openModal}]]';
        const modal = document.getElementById(modalId);
        if (modal) {
            modal.classList.remove('hidden');
            setTimeout(() => {
                const content = modal.querySelector('.modal-content');
                if (content) {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                }
            }, 10);
        }
    });
</script>
</body>
</html>
