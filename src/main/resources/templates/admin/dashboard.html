<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Sakura Saki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🌸 Sakura Saki</a>
        <div class="d-flex">
            <a class="btn btn-outline-secondary me-2" th:href="@{/admin/users}">Manage Users</a>
            <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-3">Admin Dashboard</h2>
    <p>Welcome, <strong th:text="${username}">admin</strong></p>
    <p>Total users: <span th:text="${usersCount}">0</span></p>
</div>

</body>
</html>
