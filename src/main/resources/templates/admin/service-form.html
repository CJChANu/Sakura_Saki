<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Form — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link th:href="@{/css/admin-style.css}" rel="stylesheet">
</head>
<body class="admin-body">
<canvas id="sakura-canvas"></canvas>

<aside class="admin-sidebar">
    <div class="sidebar-brand"><h1>🌸 Sakura Saki</h1><p>Admin Panel</p></div>
    <nav class="sidebar-nav">
        <a th:href="@{/admin/dashboard}"><span class="material-symbols-outlined">dashboard</span> Dashboard</a>
        <a th:href="@{/admin/services}" class="active"><span class="material-symbols-outlined">content_cut</span> Services</a>
        <a th:href="@{/admin/packages}"><span class="material-symbols-outlined">inventory_2</span> Packages</a>
    </nav>
</aside>

<main class="admin-main">
    <header class="page-header">
        <div><span class="kicker">Service Configuration</span><h2 th:text="${service.id != null} ? 'Edit Treatment' : 'Add New Treatment'">Service</h2></div>
    </header>

    <div class="content-card glass-pane clay-lift" style="max-width: 600px; margin: 0 auto;">
        <form th:action="@{/admin/services/save}" th:object="${service}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group mb-3">
                <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline);">Service Name</label>
                <input type="text" th:field="*{name}" class="input-recessed" placeholder="e.g., Radiance Facial Therapy" required>
            </div>

            <div class="form-group mb-3">
                <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline);">Category</label>
                <select th:field="*{category}" class="input-recessed" required>
                    <option value="Facial">Facial & Skin</option>
                    <option value="Nails">Nails & Esthetics</option>
                    <option value="Scalp">Scalp Spa</option>
                    <option value="Body">Body Harmonization</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 form-group mb-3">
                    <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline);">Duration (Minutes)</label>
                    <input type="number" th:field="*{duration}" class="input-recessed" min="5" max="300" required>
                </div>
                <div class="col-md-6 form-group mb-3">
                    <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline);">Price (Rs.)</label>
                    <input type="number" step="100" th:field="*{price}" class="input-recessed" min="0" required>
                </div>
            </div>

            <div class="form-group mb-4">
                <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline);">Description</label>
                <textarea th:field="*{description}" class="input-recessed" rows="4" placeholder="Describe the therapeutic sensory experience..."></textarea>
            </div>

            <div class="form-group mb-4" th:if="${service.id != null}">
                <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline); display:block;">Service Status</label>
                <div class="form-check form-switch">
                    <input type="checkbox" th:field="*{active}" class="form-check-input" id="activeSwitch">
                    <label class="form-check-label" for="activeSwitch">Visible to Customers</label>
                </div>
            </div>

            <div style="display:flex; gap:1rem; justify-content:flex-end;">
                <a th:href="@{/admin/services}" class="btn-sakura btn-sakura-outline" style="text-decoration:none;">Cancel</a>
                <button type="submit" class="btn-sakura btn-sakura-primary">Save Configuration</button>
            </div>
        </form>
    </div>
</main>
<script th:src="@{/js/sakura-petals.js}"></script>
</body>
</html>
