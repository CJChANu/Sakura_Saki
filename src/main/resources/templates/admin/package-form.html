<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Form — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link th:href="@{/css/admin-style.css}" rel="stylesheet">
    <style>
        /* Checkbox list එක ලස්සන කරන්න දාපු custom styles */
        .services-checkbox-list {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(214, 194, 196, 0.3);
            border-radius: 0.75rem;
            padding: 1rem;
            max-height: 220px;
            overflow-y: auto;
        }
        .service-checkbox-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            transition: background 0.2s ease;
            cursor: pointer;
        }
        .service-checkbox-item:hover {
            background: #fff1f2;
        }
        .service-checkbox-item input[type="checkbox"] {
            width: 1.15rem;
            height: 1.15rem;
            accent-color: #864e5a; /* ඔයාගේ ප්‍රධාන Sakura Pink පැහැය */
            cursor: pointer;
        }
        .service-checkbox-label {
            margin-left: 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .service-checkbox-category {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            background: #f8d8db;
            color: #864e5a;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
        }
    </style>
</head>
<body class="admin-body">
<canvas id="sakura-canvas"></canvas>

<aside class="admin-sidebar">
    <div class="sidebar-brand"><h1>🌸 Sakura Saki</h1><p>Admin Panel</p></div>
    <nav class="sidebar-nav">
        <a th:href="@{/admin/dashboard}"><span class="material-symbols-outlined">dashboard</span> Dashboard</a>
        <a th:href="@{/admin/services}"><span class="material-symbols-outlined">content_cut</span> Services</a>
        <a th:href="@{/admin/packages}" class="active"><span class="material-symbols-outlined">inventory_2</span> Packages</a>
    </nav>
</aside>

<main class="admin-main">
    <header class="page-header">
        <div><span class="kicker">Curation Hub</span><h2 th:text="${package.id != null} ? 'Edit Package Bundle' : 'Curate New Bundle'">Package</h2></div>
    </header>

    <div class="content-card glass-pane clay-lift" style="max-width: 650px; margin: 0 auto;">
        <form th:action="@{/admin/packages/save}" th:object="${package}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group mb-3">
                <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline);">Package Name</label>
                <input type="text" th:field="*{name}" class="input-recessed" placeholder="e.g., Ultimate Serenity Ritual" required>
            </div>

            <div class="row">
                <div class="col-md-6 form-group mb-3">
                    <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline);">Base Price (Rs.)</label>
                    <input type="number" th:field="*{price}" class="input-recessed" placeholder="Sum of individual costs" min="0" required>
                </div>
                <div class="col-md-6 form-group mb-3">
                    <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline);">Discount percentage (%)</label>
                    <input type="number" step="0.1" th:field="*{discount}" class="input-recessed" min="0" max="100" required>
                </div>
            </div>

            <div class="form-group mb-3">
                <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline); mb-2; display:block;">Select Included Treatments</label>

                <div class="services-checkbox-list">
                    <div th:each="s : ${allServices}" class="service-checkbox-item">
                        <input type="checkbox"
                               th:field="*{services}"
                               th:value="${s.id}"
                               th:id="'service_' + ${s.id}"
                               class="form-check-input me-2">
                        <label th:for="'service_' + ${s.id}" class="service-checkbox-label">
                            <div>
                                <span th:text="${s.name}" style="font-weight:600;">Treatment Name</span>
                                <span style="color: var(--outline); font-size: 0.8rem; margin-left: 0.5rem;" th:text="'— Rs.' + ${s.price}">Rs. 0</span>
                            </div>
                            <span class="service-checkbox-category" th:text="${s.category}">CAT</span>
                        </label>
                    </div>

                    <div th:if="${#lists.isEmpty(allServices)}" style="text-align:center; color:var(--outline); font-size:0.85rem; padding:1rem;">
                        No services available to select. Please add services first.
                    </div>
                </div>
            </div>

            <div class="form-group mb-4">
                <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline);">Package Description</label>
                <textarea th:field="*{description}" class="input-recessed" rows="3" placeholder="Describe how these treatments complement each other..."></textarea>
            </div>

            <div class="form-group mb-4" th:if="${package.id != null}">
                <label class="form-label" style="font-weight:700; font-size:0.75rem; text-transform:uppercase; color:var(--outline); display:block;">Package Status</label>
                <div class="form-check form-switch">
                    <input type="checkbox" th:field="*{active}" class="form-check-input" id="pkgActiveSwitch">
                    <label class="form-check-label" for="pkgActiveSwitch">Active Bundle Menu</label>
                </div>
            </div>

            <div style="display:flex; gap:1rem; justify-content:flex-end;">
                <a th:href="@{/admin/packages}" class="btn-sakura btn-sakura-outline" style="text-decoration:none;">Cancel</a>
                <button type="submit" class="btn-sakura btn-sakura-primary">Save Package Bundle</button>
            </div>
        </form>
    </div>
</main>
<script th:src="@{/js/sakura-petals.js}"></script>
</body>
</html>
