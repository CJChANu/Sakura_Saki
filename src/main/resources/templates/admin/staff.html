<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/fragments :: head('Staff — Sakura Saki Admin')}"></head>
<body class="bg-surface text-on-surface font-body">
<th:block th:replace="~{layout/fragments :: sakura-canvas}" />

<div class="flex min-h-screen w-full relative z-10 md:pl-72">
    <!-- Sidebar -->
    <aside th:replace="~{layout/fragments :: admin-sidebar('staff')}"></aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-10 lg:p-14 relative flex flex-col">
        <!-- Page Header -->
        <header class="flex justify-between items-end mb-12 flex-wrap gap-4">
            <div>
                <span class="text-primary font-label text-xs font-bold tracking-[0.2em] uppercase block mb-2">Manage</span>
                <h1 class="font-headline text-4xl text-tertiary font-bold">Staff & Beauticians</h1>
            </div>
            <div class="flex items-center gap-4">
                <button data-modal-target="createStaffModal" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors flex items-center gap-2 shadow-md">
                    <span class="material-symbols-outlined text-sm">person_add</span> Add Staff
                </button>
            </div>
        </header>

        <!-- Alerts -->
        <div th:if="${success}" class="mb-6 p-4 rounded-2xl bg-tertiary-container/30 border border-tertiary-container text-tertiary-fixed-variant font-body text-sm flex items-center gap-3">
            <span class="material-symbols-outlined">check_circle</span> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="mb-6 p-4 rounded-2xl bg-error-container/30 border border-error-container text-on-error-container font-body text-sm flex items-center gap-3">
            <span class="material-symbols-outlined">error</span> <span th:text="${error}"></span>
        </div>

        <!-- Content List -->
        <div class="glass-pane bg-surface-container-lowest rounded-[2rem] p-6 lg:p-8 clay-lift border border-outline-variant/30 flex-1">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr class="border-b border-outline-variant/30">
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Staff Member</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Role/Spec</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Contact</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Schedule</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Status</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${staffList.content}" class="border-b border-outline-variant/10 hover:bg-surface-container-low/50 transition-colors group">
                            <td class="py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-xs shadow-sm"
                                         th:text="${#strings.toUpperCase(#strings.substring(s.firstName, 0, 1)) + #strings.toUpperCase(#strings.substring(s.lastName, 0, 1))}">NA</div>
                                    <div>
                                        <p class="font-body font-bold text-sm text-on-surface" th:text="${s.firstName + ' ' + s.lastName}">Name</p>
                                    </div>
                                </div>
                            </td>
                            <td class="py-4">
                                <span class="px-3 py-1 bg-surface-container-high rounded-full font-label text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" th:text="${s.staffType}">Role</span>
                                <p class="font-body text-[11px] text-on-surface-variant mt-1" th:text="${s.specialization ?: 'General'}">Spec</p>
                            </td>
                            <td class="py-4">
                                <p class="font-body text-sm text-on-surface-variant" th:text="${s.email}">email</p>
                                <p class="font-body text-xs text-outline mt-0.5" th:text="${s.phone}">phone</p>
                            </td>
                            <td class="py-4">
                                <p class="font-label text-[10px] font-bold text-on-surface-variant tracking-wider" th:text="${s.workingDays ?: '—'}">MON-FRI</p>
                                <p class="font-body text-sm text-outline mt-0.5" th:text="${s.startTime != null ? (s.startTime + ' - ' + s.endTime) : '—'}">9-5</p>
                            </td>
                            <td class="py-4">
                                <span class="px-3 py-1 rounded-full font-label text-[10px] font-bold uppercase tracking-wider"
                                      th:classappend="${s.active} ? 'bg-tertiary-container/30 text-tertiary-fixed-variant' : 'bg-surface-container text-outline'"
                                      th:text="${s.active ? 'Active' : 'Inactive'}">Active</span>
                            </td>
                            <td class="py-4 text-right">
                                <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button th:data-modal-target="'editStaff' + ${s.id}" class="w-8 h-8 rounded-full bg-surface-container hover:bg-surface-container-high text-on-surface flex items-center justify-center transition-colors">
                                        <span class="material-symbols-outlined text-sm">edit</span>
                                    </button>
                                    <form th:action="@{'/admin/staff/' + ${s.id} + '/toggle-active'}" method="post">
                                        <button type="submit" class="w-8 h-8 rounded-full bg-surface-container hover:bg-surface-container-high text-on-surface flex items-center justify-center transition-colors" th:title="${s.active} ? 'Disable' : 'Enable'">
                                            <span class="material-symbols-outlined text-sm" th:text="${s.active} ? 'block' : 'check_circle'"></span>
                                        </button>
                                    </form>
                                    <form th:action="@{'/admin/staff/' + ${s.id} + '/delete'}" method="post" onsubmit="return confirm('Are you sure you want to delete this staff member?');">
                                        <button type="submit" class="w-8 h-8 rounded-full bg-error-container/20 hover:bg-error-container text-on-error-container flex items-center justify-center transition-colors">
                                            <span class="material-symbols-outlined text-sm">delete</span>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${staffList.empty}">
                            <td colspan="6" class="py-12 text-center text-on-surface-variant font-body text-sm">No staff members found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <th:block th:replace="~{layout/fragments :: pagination-controls(page=${staffList}, url='/admin/staff')}" />
            

        </div>

        <!-- Footer -->
        
    </main>
</div>

<!-- Create Staff Modal -->
<div id="createStaffModal" class="sakura-modal hidden fixed inset-0 z-[100] items-center justify-center bg-on-surface/20 backdrop-blur-sm transition-all duration-300 overflow-y-auto pt-24 pb-10">
    <div class="modal-content bg-surface-container-lowest w-full max-w-2xl rounded-[2rem] shadow-2xl p-8 scale-95 opacity-0 transition-all duration-300 transform border border-outline-variant/30 my-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-headline text-2xl font-bold text-tertiary">Register Staff</h3>
            <button data-modal-close class="text-outline hover:text-on-surface transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form th:action="@{/admin/staff/create}" method="post">
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">First Name</label>
                        <input name="firstName" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${prevFirstName}" required>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Last Name</label>
                        <input name="lastName" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${prevLastName}" required>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Email</label>
                        <input name="email" type="email" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${prevEmail}" required>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Phone</label>
                        <input name="phone" type="tel" pattern="[0-9]+" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${prevPhone}" title="Only digits are allowed" required>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Staff Type</label>
                        <select name="staffType" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner">
                            <option value="STYLIST" th:selected="${prevStaffType == 'STYLIST'}">Stylist</option>
                            <option value="THERAPIST" th:selected="${prevStaffType == 'THERAPIST'}">Therapist</option>
                            <option value="GENERAL" th:selected="${prevStaffType == 'GENERAL'}">General</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Specialization</label>
                        <select name="specialization" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner">
                            <option value="Hair Styling" th:selected="${prevSpecialization == 'Hair Styling'}">Hair Styling</option>
                            <option value="Skincare & Facials" th:selected="${prevSpecialization == 'Skincare & Facials'}">Skincare & Facials</option>
                            <option value="Spa & Massage" th:selected="${prevSpecialization == 'Spa & Massage'}">Spa & Massage</option>
                            <option value="Nail Art & Care" th:selected="${prevSpecialization == 'Nail Art & Care'}">Nail Art & Care</option>
                            <option value="General" th:selected="${prevSpecialization == 'General'}">General</option>
                            <option th:if="${prevSpecialization != 'Hair Styling' and prevSpecialization != 'Skincare & Facials' and prevSpecialization != 'Spa & Massage' and prevSpecialization != 'Nail Art & Care' and prevSpecialization != 'General' and prevSpecialization != null}" th:value="${prevSpecialization}" th:text="${prevSpecialization}" selected></option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Working Days</label>
                    <div class="flex flex-wrap gap-3 mt-2">
                        <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="MON" th:checked="${prevWorkingDays != null and #strings.contains(prevWorkingDays, 'MON')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Mon</label>
                        <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="TUE" th:checked="${prevWorkingDays != null and #strings.contains(prevWorkingDays, 'TUE')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Tue</label>
                        <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="WED" th:checked="${prevWorkingDays != null and #strings.contains(prevWorkingDays, 'WED')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Wed</label>
                        <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="THU" th:checked="${prevWorkingDays != null and #strings.contains(prevWorkingDays, 'THU')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Thu</label>
                        <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="FRI" th:checked="${prevWorkingDays != null and #strings.contains(prevWorkingDays, 'FRI')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Fri</label>
                        <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="SAT" th:checked="${prevWorkingDays != null and #strings.contains(prevWorkingDays, 'SAT')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Sat</label>
                        <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="SUN" th:checked="${prevWorkingDays != null and #strings.contains(prevWorkingDays, 'SUN')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Sun</label>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Start Time</label>
                        <input name="startTime" type="time" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${prevStartTime ?: '09:00'}">
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">End Time</label>
                        <input name="endTime" type="time" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${prevEndTime ?: '17:00'}">
                    </div>
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button type="button" data-modal-close class="px-6 py-3 rounded-full font-label text-xs font-bold text-on-surface uppercase tracking-wider hover:bg-surface-container transition-colors">Cancel</button>
                <button type="submit" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors shadow-md">Register</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modals -->
<th:block th:each="s : ${staffList}">
    <div th:id="'editStaff' + ${s.id}" class="sakura-modal hidden fixed inset-0 z-[100] items-center justify-center bg-on-surface/20 backdrop-blur-sm transition-all duration-300 overflow-y-auto pt-24 pb-10">
        <div class="modal-content bg-surface-container-lowest w-full max-w-2xl rounded-[2rem] shadow-2xl p-8 scale-95 opacity-0 transition-all duration-300 transform border border-outline-variant/30 my-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-headline text-2xl font-bold text-tertiary">Edit Staff</h3>
                <button data-modal-close class="text-outline hover:text-on-surface transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form th:action="@{'/admin/staff/' + ${s.id} + '/update'}" method="post">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">First Name</label>
                            <input name="firstName" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${s.firstName}" required>
                        </div>
                        <div>
                            <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Last Name</label>
                            <input name="lastName" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${s.lastName}" required>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Email</label>
                            <input name="email" type="email" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${s.email}" required>
                        </div>
                        <div>
                            <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Phone</label>
                            <input name="phone" type="tel" pattern="[0-9]+" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${s.phone}" title="Only digits are allowed" required>
                        </div>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Specialization</label>
                        <select name="specialization" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner">
                            <option value="Hair Styling" th:selected="${s.specialization == 'Hair Styling'}">Hair Styling</option>
                            <option value="Skincare & Facials" th:selected="${s.specialization == 'Skincare & Facials'}">Skincare & Facials</option>
                            <option value="Spa & Massage" th:selected="${s.specialization == 'Spa & Massage'}">Spa & Massage</option>
                            <option value="Nail Art & Care" th:selected="${s.specialization == 'Nail Art & Care'}">Nail Art & Care</option>
                            <option value="General" th:selected="${s.specialization == 'General'}">General</option>
                            <option th:if="${s.specialization != 'Hair Styling' and s.specialization != 'Skincare & Facials' and s.specialization != 'Spa & Massage' and s.specialization != 'Nail Art & Care' and s.specialization != 'General' and s.specialization != null}" th:value="${s.specialization}" th:text="${s.specialization}" selected></option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Working Days</label>
                        <div class="flex flex-wrap gap-3 mt-2">
                            <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="MON" th:checked="${s.workingDays != null and #strings.contains(s.workingDays, 'MON')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Mon</label>
                            <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="TUE" th:checked="${s.workingDays != null and #strings.contains(s.workingDays, 'TUE')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Tue</label>
                            <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="WED" th:checked="${s.workingDays != null and #strings.contains(s.workingDays, 'WED')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Wed</label>
                            <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="THU" th:checked="${s.workingDays != null and #strings.contains(s.workingDays, 'THU')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Thu</label>
                            <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="FRI" th:checked="${s.workingDays != null and #strings.contains(s.workingDays, 'FRI')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Fri</label>
                            <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="SAT" th:checked="${s.workingDays != null and #strings.contains(s.workingDays, 'SAT')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Sat</label>
                            <label class="flex items-center gap-1.5 cursor-pointer font-body text-sm text-on-surface"><input type="checkbox" name="workingDays" value="SUN" th:checked="${s.workingDays != null and #strings.contains(s.workingDays, 'SUN')}" class="text-primary focus:ring-primary border-outline-variant rounded"> Sun</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Start</label>
                            <input name="startTime" type="time" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${s.startTime}">
                        </div>
                        <div>
                            <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">End</label>
                            <input name="endTime" type="time" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${s.endTime}">
                        </div>
                    </div>
                </div>
                <div class="mt-8 flex justify-end gap-3">
                    <button type="button" data-modal-close class="px-6 py-3 rounded-full font-label text-xs font-bold text-on-surface uppercase tracking-wider hover:bg-surface-container transition-colors">Cancel</button>
                    <button type="submit" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors shadow-md">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</th:block>

<th:block th:replace="~{layout/fragments :: sakura-js}" />
<script th:if="${openModal}">
    document.addEventListener('DOMContentLoaded', () => {
        const modalId = '[[${openModal}]]';
        const modal = document.getElementById(modalId);
        if (modal) {
            modal.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity
            setTimeout(() => {
                const content = modal.querySelector('.modal-content');
                if (content) {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                }
            }, 10);
        }
    });
</script>
</body>
</html>
