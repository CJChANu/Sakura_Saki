<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management - Sakura Saki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🌸 Sakura Saki</a>
        <div class="d-flex">
            <a class="btn btn-outline-secondary me-2" th:href="@{/admin/dashboard}">Dashboard</a>
            <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-3">Users</h2>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}">1</td>
            <td th:text="${u.username}">user</td>
            <td th:text="${u.email}">user@mail.com</td>
            <td th:text="${u.role}">ROLE_USER</td>
            <td>
                <form th:action="@{'/admin/users/' + ${u.id} + '/make-admin'}" method="post">
                    <button class="btn btn-sm btn-primary"
                            th:if="${u.role != 'ROLE_ADMIN'}"
                            type="submit">
                        Make Admin
                    </button>
                    <span th:if="${u.role == 'ROLE_ADMIN'}" class="badge bg-success">Admin</span>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
