<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/fragments :: head('Packages — Sakura Saki Admin')}"></head>
<body class="bg-surface text-on-surface font-body">
<th:block th:replace="~{layout/fragments :: sakura-canvas}" />

<div class="flex min-h-screen w-full relative z-10 md:pl-72">
    <!-- Sidebar -->
    <aside th:replace="~{layout/fragments :: admin-sidebar('packages')}"></aside>

    <!-- Main Content -->
    <main class="flex-1 px-6 pt-6 md:px-10 pt-10 lg:px-14 pt-14 relative flex flex-col pb-2">
        <!-- Page Header -->
        <header class="flex justify-between items-end mb-12 flex-wrap gap-4">
            <div>
                <span class="text-primary font-label text-xs font-bold tracking-[0.2em] uppercase block mb-2">Manage</span>
                <h1 class="font-headline text-4xl text-tertiary font-bold">Service Packages</h1>
            </div>
            <div class="flex items-center gap-4">
                <button data-modal-target="createPkgModal" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors flex items-center gap-2 shadow-md">
                    <span class="material-symbols-outlined text-sm">add</span> New Package
                </button>
            </div>
        </header>

        <!-- Alerts -->
        <div th:if="${success}" class="mb-6 p-4 rounded-2xl bg-tertiary-container/30 border border-tertiary-container text-tertiary-fixed-variant font-body text-sm flex items-center gap-3">
            <span class="material-symbols-outlined">check_circle</span> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="mb-6 p-4 rounded-2xl bg-error-container/30 border border-error-container text-on-error-container font-body text-sm flex items-center gap-3">
            <span class="material-symbols-outlined">error</span> <span th:text="${error}"></span>
        </div>

        <!-- Content List -->
        <div class="glass-pane bg-surface-container-lowest rounded-[2rem] p-6 lg:p-8 clay-lift border border-outline-variant/30 flex-1">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-outline-variant/30">
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Name</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Services</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider text-right">Base Price</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider text-right">Discount</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider text-right">Final Price</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Duration</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Status</th>
                            <th class="pb-4 font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${packages}" class="border-b border-outline-variant/10 hover:bg-surface-container-low/50 transition-colors group">
                            <td class="py-4">
                                <p class="font-body font-bold text-sm text-on-surface" th:text="${p.name}">Pkg</p>
                            </td>
                            <td class="py-4 max-w-xs truncate">
                                <span class="font-body text-xs text-on-surface-variant" th:each="s,it : ${p.services}" th:text="${s.name + (it.last ? '' : ', ')}">svc</span>
                            </td>
                            <td class="py-4 text-right font-body text-sm text-outline line-through decoration-outline/50" th:text="'Rs. ' + ${#numbers.formatDecimal(p.totalPrice,1,2)}">Rs.</td>
                            <td class="py-4 text-right">
                                <span class="px-2 py-1 bg-primary-container/50 text-primary-fixed-variant rounded font-label text-[10px] font-bold" th:text="${p.discountPercent} + '%'">10%</span>
                            </td>
                            <td class="py-4 text-right">
                                <p class="font-body font-bold text-sm text-primary" th:text="'Rs. ' + ${#numbers.formatDecimal(p.discountedPrice,1,2)}">Rs.</p>
                            </td>
                            <td class="py-4 font-body text-sm text-on-surface-variant" th:text="${p.totalDuration} + ' min'">min</td>
                            <td class="py-4">
                                <span class="px-3 py-1 rounded-full font-label text-[10px] font-bold uppercase tracking-wider"
                                      th:classappend="${p.active} ? 'bg-tertiary-container/30 text-tertiary-fixed-variant' : 'bg-surface-container text-outline'"
                                      th:text="${p.active ? 'Active' : 'Inactive'}">Active</span>
                            </td>
                            <td class="py-4 text-right">
                                <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button th:data-modal-target="'editPkgModal' + ${p.id}" class="w-8 h-8 rounded-full bg-surface-container hover:bg-surface-container-high text-on-surface flex items-center justify-center transition-colors">
                                        <span class="material-symbols-outlined text-sm">edit</span>
                                    </button>
                                    <form th:action="@{'/admin/packages/' + ${p.id} + '/toggle-active'}" method="post">
                                        <button type="submit" class="w-8 h-8 rounded-full bg-surface-container hover:bg-surface-container-high text-on-surface flex items-center justify-center transition-colors" th:title="${p.active} ? 'Disable' : 'Enable'">
                                            <span class="material-symbols-outlined text-sm" th:text="${p.active} ? 'block' : 'check_circle'"></span>
                                        </button>
                                    </form>
                                    <form th:action="@{'/admin/packages/' + ${p.id} + '/delete'}" method="post" onsubmit="return confirm('Are you sure you want to delete this package?');">
                                        <button type="submit" class="w-8 h-8 rounded-full bg-error-container/20 hover:bg-error-container text-on-error-container flex items-center justify-center transition-colors">
                                            <span class="material-symbols-outlined text-sm">delete</span>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(packages)}">
                            <td colspan="8" class="py-12 text-center text-on-surface-variant font-body text-sm">No packages found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        
<footer th:replace="~{layout/fragments :: dashboard-footer}"></footer>
    </main>
</div>

<!-- Create Modal -->
<div id="createPkgModal" class="sakura-modal hidden fixed inset-0 z-[100] items-center justify-center bg-on-surface/20 backdrop-blur-sm transition-all duration-300">
    <div class="modal-content bg-surface-container-lowest w-full max-w-lg rounded-[2rem] shadow-2xl p-8 scale-95 opacity-0 transition-all duration-300 transform border border-outline-variant/30">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-headline text-2xl font-bold text-tertiary">Create Package</h3>
            <button data-modal-close class="text-outline hover:text-on-surface transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form th:action="@{/admin/packages/create}" method="post">
            <div class="space-y-4">
                <div>
                    <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Package Name</label>
                    <input name="name" type="text" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" placeholder="e.g. Bridal Glow Package" th:value="${prevName}" required>
                </div>
                <div>
                    <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Description</label>
                    <textarea name="description" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner resize-none h-24" placeholder="Brief description of the package" th:text="${prevDescription}" required></textarea>
                </div>
                <div>
                    <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Discount (%)</label>
                    <input name="discountPercent" type="number" step="1" min="1" max="100" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" placeholder="15" th:value="${prevDiscountPercent}" required>
                </div>
                <div>
                    <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Included Services</label>
                    <div class="h-48 overflow-y-auto bg-surface-container-high rounded-xl p-4 shadow-inner space-y-2 border border-outline-variant/10">
                        <label th:each="s : ${allServices}" class="flex items-center gap-3 p-2 hover:bg-surface-container-highest rounded-lg cursor-pointer transition-colors">
                            <input type="checkbox" name="serviceIds" th:value="${s.id}" th:checked="${prevServiceIds != null and #lists.contains(prevServiceIds, s.id)}" class="text-primary focus:ring-primary border-outline-variant rounded">
                            <span class="font-body text-sm text-on-surface" th:text="${s.name + ' (Rs. ' + #numbers.formatDecimal(s.price,1,2) + ')'}">Service</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button type="button" data-modal-close class="px-6 py-3 rounded-full font-label text-xs font-bold text-on-surface uppercase tracking-wider hover:bg-surface-container transition-colors">Cancel</button>
                <button type="submit" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors shadow-md">Create Package</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modals -->
<th:block th:each="p : ${packages}">
    <div th:id="'editPkgModal' + ${p.id}" class="sakura-modal hidden fixed inset-0 z-[100] items-center justify-center bg-on-surface/20 backdrop-blur-sm transition-all duration-300">
        <div class="modal-content bg-surface-container-lowest w-full max-w-lg rounded-[2rem] shadow-2xl p-8 scale-95 opacity-0 transition-all duration-300 transform border border-outline-variant/30">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-headline text-2xl font-bold text-tertiary">Edit Package</h3>
                <button data-modal-close class="text-outline hover:text-on-surface transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form th:action="@{'/admin/packages/' + ${p.id} + '/update'}" method="post">
                <div class="space-y-4">
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Package Name</label>
                        <input name="name" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${p.name}" required>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Description</label>
                        <textarea name="description" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" rows="2" th:text="${p.description}"></textarea>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Discount (%)</label>
                        <input name="discountPercent" type="number" step="0.5" min="0.1" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" th:value="${p.discountPercent}" required>
                    </div>
                    <div>
                        <label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Select Services</label>
                        <select name="serviceIds" class="w-full px-4 py-3 rounded-xl bg-surface-container-high border-none font-body text-sm text-on-surface focus:ring-2 focus:ring-primary/30 shadow-inner" multiple style="min-height:120px;">
                            <option th:each="s : ${allServices}" th:value="${s.id}" th:text="${s.name + ' — Rs.' + s.price}" th:selected="${#lists.contains(p.services, s)}">svc</option>
                        </select>
                        <p class="text-[10px] text-outline mt-1 font-body text-right">Hold Cmd/Ctrl to select multiple.</p>
                    </div>
                </div>
                <div class="mt-8 flex justify-end gap-3">
                    <button type="button" data-modal-close class="px-6 py-3 rounded-full font-label text-xs font-bold text-on-surface uppercase tracking-wider hover:bg-surface-container transition-colors">Cancel</button>
                    <button type="submit" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors shadow-md">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</th:block>

<th:block th:replace="~{layout/fragments :: sakura-js}" />
<script th:if="${openModal}">
    document.addEventListener('DOMContentLoaded', () => {
        const modalId = '[[${openModal}]]';
        const modal = document.getElementById(modalId);
        if (modal) {
            modal.classList.remove('hidden');
            setTimeout(() => {
                const content = modal.querySelector('.modal-content');
                if (content) {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                }
            }, 10);
        }
    });
</script>
</body>
</html>
