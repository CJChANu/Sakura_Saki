<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero-section small-hero">
    <video autoplay muted loop playsinline class="hero-video">
        <source th:src="@{/videos/29920-383980356.mp4}" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div class="container hero-content">
        <div class="hero-badge">Reserve Your Beauty Time</div>
        <h1 class="hero-title">Book Your <span>Appointment</span></h1>
        <p class="hero-subtitle">
            Fill in your details and send your salon appointment request quickly and easily.
        </p>
    </div>
</section>

<section class="reviews-section pt-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="review-card">
                    <h2 class="section-title mb-4">Appointment Form</h2>

                    <form th:action="@{/book-appointment}" th:object="${appointment}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Customer Name</label>
                            <input type="text" class="form-control" th:field="*{customerName}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="text" class="form-control" th:field="*{phone}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Service Name</label>
                            <input type="text" class="form-control" th:field="*{serviceName}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Date</label>
                                <input type="date" class="form-control" th:field="*{date}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Time</label>
                                <input type="time" class="form-control" th:field="*{time}" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-center gap-3 flex-wrap mt-4">
                            <a th:href="@{/}" class="btn btn-outline-secondary">Back Home</a>
                            <button type="submit" class="btn btn-primary">Confirm Booking</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
