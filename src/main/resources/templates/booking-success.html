<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Success</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero-section small-hero">
    <video autoplay muted loop playsinline class="hero-video">
        <source th:src="@{/videos/29920-383980356.mp4}" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div class="container hero-content">
        <div class="hero-badge">Appointment Request Sent</div>
        <h1 class="hero-title">Booking <span>Successful</span></h1>
        <p class="hero-subtitle">
            Thank you for choosing our salon. Your appointment request has been successfully submitted.
        </p>

        <div class="hero-buttons d-flex justify-content-center gap-3 flex-wrap">
            <a th:href="@{/}" class="btn btn-primary">Back Home</a>
            <a th:href="@{/our-services}" class="btn btn-outline-light">Browse Services</a>
        </div>
    </div>
</section>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
