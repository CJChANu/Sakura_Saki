<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/fragments :: head('My Bookings — Sakura Saki')}"></head>
<body class="bg-surface text-on-surface overflow-x-hidden">
<th:block th:replace="~{layout/fragments :: sakura-canvas}" />

<div class="flex min-h-screen">
    <aside th:replace="~{layout/fragments :: customer-sidebar('bookings')}"></aside>

    <main class="flex-1 overflow-y-auto p-12 relative flex flex-col min-h-screen">
        <header class="flex justify-between items-center mb-12">
            <div>
                <span class="text-primary font-label text-xs font-extrabold tracking-[0.2em] uppercase block mb-2">Appointments</span>
                <h1 class="font-headline text-4xl text-on-surface font-bold">My Bookings</h1>
            </div>
            <a th:href="@{/booking}" class="px-8 py-3 bg-primary text-on-primary rounded-full font-label text-xs font-bold uppercase tracking-wider hover:scale-105 transition-all shadow-lg" style="text-decoration:none;">
                <span class="material-symbols-outlined text-sm align-middle mr-1">add</span> New Booking
            </a>
        </header>

        <!-- Booking Cards -->
        <div class="space-y-6">
            <div th:each="appt : ${appointments}" class="bg-white rounded-lg p-6 clay-lift flex flex-col md:flex-row md:items-center justify-between gap-6 group">
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 rounded-lg flex items-center justify-center shrink-0"
                         th:classappend="${appt.status == 'COMPLETED' ? 'bg-green-100' : (appt.status == 'CANCELLED' ? 'bg-red-100' : 'bg-primary-container/40')}">
                        <span class="material-symbols-outlined text-2xl"
                              th:classappend="${appt.status == 'COMPLETED' ? 'text-green-700' : (appt.status == 'CANCELLED' ? 'text-red-700' : 'text-primary')}"
                              th:text="${appt.status == 'COMPLETED' ? 'check_circle' : (appt.status == 'CANCELLED' ? 'cancel' : 'event')}">event</span>
                    </div>
                    <div>
                        <h3 class="font-bold text-on-surface" th:text="${appt.service != null ? appt.service.name : 'Service'}">Rejuvenating Facial</h3>
                        <div class="flex flex-wrap gap-4 mt-1 text-xs text-on-surface-variant">
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">calendar_today</span> <span th:text="${appt.appointmentDate}">2024-01-15</span></span>
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">schedule</span> <span th:text="${appt.appointmentTime}">14:30</span></span>
                            <span class="flex items-center gap-1" th:if="${appt.staff != null}"><span class="material-symbols-outlined text-sm">person</span> <span th:text="${appt.staff.firstName + ' ' + appt.staff.lastName}">Stylist</span></span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="inline-block px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-[0.05em]"
                          th:classappend="${appt.status == 'SCHEDULED' ? 'bg-rose-100 text-rose-700' : (appt.status == 'COMPLETED' ? 'bg-green-100 text-green-700' : (appt.status == 'CANCELLED' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'))}"
                          th:text="${appt.status}">Scheduled</span>
                    <form th:if="${appt.status == 'SCHEDULED'}" th:action="@{/my-appointments/{id}/cancel(id=${appt.id})}" method="post">
                        <button type="submit" class="px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-[0.05em] bg-surface-container-high text-on-surface hover:bg-error-container hover:text-on-error-container transition-all">Cancel</button>
                    </form>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(appointments)}" class="bg-white rounded-lg p-16 clay-lift text-center">
                <span class="material-symbols-outlined text-6xl text-outline-variant mb-4">event_busy</span>
                <h3 class="font-headline text-xl font-bold text-on-surface mb-2">No bookings yet</h3>
                <p class="text-sm text-on-surface-variant mb-6">Start your beauty journey by booking your first appointment.</p>
                <a th:href="@{/booking}" class="px-10 py-4 bg-primary text-on-primary rounded-full font-label text-xs font-bold uppercase tracking-wider inline-block hover:scale-105 transition-all" style="text-decoration:none;">Browse Services</a>
            </div>
        </div>

        <footer th:replace="~{layout/fragments :: dashboard-footer}"></footer>
    </main>
</div>

<th:block th:replace="~{layout/fragments :: sakura-js}" />
</body>
</html>
