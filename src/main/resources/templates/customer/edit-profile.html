<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — Sakura Saki</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link th:href="@{/css/admin-style.css}" rel="stylesheet">
</head>
<body class="admin-body">
<canvas id="sakura-canvas"></canvas>
<aside class="admin-sidebar">
    <div class="sidebar-brand"><h1>🌸 Sakura Saki</h1><p>Beauty & Wellness</p></div>
    <nav class="sidebar-nav">
        <a th:href="@{/profile}" class="active"><span class="material-symbols-outlined">person</span> Profile</a>
        <a th:href="@{/services}"><span class="material-symbols-outlined">content_cut</span> Services</a>
        <a th:href="@{/staff}"><span class="material-symbols-outlined">badge</span> Our Team</a>
        <a th:href="@{/booking}"><span class="material-symbols-outlined">calendar_add_on</span> Book Now</a>
        <a th:href="@{/my-appointments}"><span class="material-symbols-outlined">event_note</span> My Bookings</a>
        <a th:href="@{/logout}"><span class="material-symbols-outlined">logout</span> Logout</a>
    </nav>
</aside>
<main class="admin-main">
    <header class="page-header"><div><span class="kicker">Account</span><h2>Edit Profile</h2></div></header>
    <div class="content-card glass-pane clay-lift" style="max-width:550px;">
        <form th:action="@{/profile/update}" method="post">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem;">
                <div class="form-group"><label>First Name</label><input name="firstName" type="text" class="input-recessed" th:value="${customer?.firstName}" required></div>
                <div class="form-group"><label>Last Name</label><input name="lastName" type="text" class="input-recessed" th:value="${customer?.lastName}" required></div>
            </div>
            <div class="form-group" style="margin-bottom:1.25rem;"><label>Phone</label><input name="phone" type="tel" class="input-recessed" th:value="${customer?.phone}" placeholder="07X XXXX XXX"></div>
            <div style="display:flex;gap:1rem;">
                <button type="submit" class="btn-sakura btn-sakura-primary"><span class="material-symbols-outlined" style="font-size:1rem;">save</span> Save Changes</button>
                <a th:href="@{/profile}" class="btn-sakura btn-sakura-outline">Cancel</a>
            </div>
        </form>
    </div>
    <footer class="admin-footer"><span>© 2024 SAKURA SAKI BEAUTY & WELLNESS. ALL RIGHTS RESERVED. · DEVELOPED BY CJCC & YAKA LABS</span></footer>
</main>
<script th:src="@{/js/sakura-petals.js}"></script>
</body>
</html>
