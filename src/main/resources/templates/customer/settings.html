<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/fragments :: head('Profile Settings — Sakura Saki')}"></head>
<body class="bg-surface text-on-surface overflow-x-hidden">
<th:block th:replace="~{layout/fragments :: sakura-canvas}" />

<div class="flex min-h-screen">
    <aside th:replace="~{layout/fragments :: customer-sidebar('settings')}"></aside>

    <main class="flex-1 overflow-y-auto p-12 relative flex flex-col min-h-screen">
        <!-- Header -->
        <header class="mb-12">
            <span class="text-primary font-label text-xs font-extrabold tracking-[0.2em] uppercase block mb-2">Account</span>
            <h1 class="font-headline text-4xl text-on-surface font-bold">Profile Settings</h1>
        </header>

        <div th:if="${success}" class="mb-8 p-4 bg-green-100 text-green-800 rounded-lg text-center font-medium shadow-sm" th:text="${success}"></div>
        <div th:if="${error}" class="mb-8 p-4 bg-red-100 text-red-800 rounded-lg text-center font-medium shadow-sm" th:text="${error}"></div>

        <!-- Bento Grid for Settings -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            
            <!-- Edit Profile -->
            <div class="bg-white rounded-lg p-8 clay-lift relative overflow-hidden">
                <h2 class="font-headline text-2xl font-bold text-on-surface mb-6">Personal Details</h2>
                <form th:action="@{/customer/settings/update}" method="post" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-primary">First Name</label>
                            <input name="firstName" type="text" class="w-full bg-surface-container-low border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary shadow-inner" th:value="${customer?.firstName}" required>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-primary">Last Name</label>
                            <input name="lastName" type="text" class="w-full bg-surface-container-low border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary shadow-inner" th:value="${customer?.lastName}" required>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-primary">Email (Read Only)</label>
                        <input type="email" class="w-full bg-surface-container-high border-none rounded-lg p-4 text-on-surface-variant shadow-inner" th:value="${user?.email}" disabled>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-primary">Phone Number</label>
                        <input name="phone" type="tel" class="w-full bg-surface-container-low border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary shadow-inner" th:value="${customer?.phone}" placeholder="07X XXXX XXX" pattern="[0-9]{10}" minlength="10" maxlength="10" required>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="px-8 py-4 bg-primary text-on-primary rounded-full font-label text-xs font-bold uppercase tracking-wider hover:scale-105 transition-all w-full text-center">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>

            <!-- Security / Password -->
            <div class="bg-white rounded-lg p-8 clay-lift relative overflow-hidden h-fit">
                <h2 class="font-headline text-2xl font-bold text-on-surface mb-6">Security</h2>
                <form th:action="@{/customer/settings/change-password}" method="post" class="space-y-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-primary">Current Password</label>
                        <input name="currentPassword" type="password" class="w-full bg-surface-container-low border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary shadow-inner" required>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-primary">New Password</label>
                        <input name="newPassword" type="password" class="w-full bg-surface-container-low border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary shadow-inner" required>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="px-8 py-4 bg-surface-container-high text-on-surface rounded-full font-label text-xs font-bold uppercase tracking-wider hover:bg-primary-container hover:text-on-primary-container transition-all w-full text-center">
                            Update Password
                        </button>
                    </div>
                </form>
            </div>

        </div>

        <footer th:replace="~{layout/fragments :: dashboard-footer}"></footer>
    </main>
</div>

<th:block th:replace="~{layout/fragments :: sakura-js}" />
</body>
</html>
