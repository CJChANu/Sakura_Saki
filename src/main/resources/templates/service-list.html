<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Service Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero-section small-hero">
    <video autoplay muted loop playsinline class="hero-video">
        <source th:src="@{/videos/29920-383980356.mp4}" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div class="container hero-content">
        <div class="hero-badge">Admin Service Control</div>
        <h1 class="hero-title">Manage <span>Services</span></h1>
        <p class="hero-subtitle">Add, edit, and organize salon services with a premium admin experience.</p>

        <div class="hero-buttons d-flex justify-content-center gap-3 flex-wrap">
            <a th:href="@{/services/add}" class="btn btn-primary">Add Service</a>
            <a th:href="@{/packages}" class="btn btn-outline-light">Manage Packages</a>
        </div>
    </div>
</section>

<section class="reviews-section pt-5">
    <div class="container">
        <div class="table-responsive">
            <table class="table table-hover align-middle bg-white rounded-4 overflow-hidden">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Duration</th>
                    <th>Price</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="service : ${services}">
                    <td th:text="${service.serviceId}"></td>
                    <td th:text="${service.serviceName}"></td>
                    <td th:text="${service.category}"></td>
                    <td th:text="${service.duration} + ' mins'"></td>
                    <td th:text="'Rs. ' + ${service.price}"></td>
                    <td th:text="${service.description}"></td>
                    <td>
                        <span th:if="${service.available}" class="badge bg-success review-status">AVAILABLE</span>
                        <span th:unless="${service.available}" class="badge bg-danger review-status">NOT AVAILABLE</span>
                    </td>
                    <td>
                        <a class="btn btn-warning btn-sm me-1"
                           th:href="@{/services/edit/{id}(id=${service.serviceId})}">Edit</a>
                        <a class="btn btn-danger btn-sm"
                           th:href="@{/services/delete/{id}(id=${service.serviceId})}">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
