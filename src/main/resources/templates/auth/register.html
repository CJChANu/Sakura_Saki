<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Sakura Saki</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link th:href="@{/css/admin-style.css}" rel="stylesheet">
</head>
<body>
<canvas id="sakura-canvas"></canvas>

<div class="auth-container">
    <div class="auth-card">

        <div class="auth-brand">
            <h1>🌸 Sakura Saki</h1>
            <p>Beauty & Wellness</p>
        </div>

        <h2>Create Account</h2>
        <p class="subtitle">Get started with Sakura Saki</p>

        <!-- Error message -->
        <div th:if="${error}" class="sakura-alert sakura-alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" class="input-recessed" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" class="input-recessed" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" class="input-recessed" placeholder="Create a password" required>
            </div>
            <button class="btn-sakura btn-sakura-primary" type="submit" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
                <span class="material-symbols-outlined" style="font-size: 1rem;">person_add</span>
                Create Account
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--outline);">
            Already have an account?
            <a th:href="@{/login}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In</a>
        </p>
    </div>
</div>

<script th:src="@{/js/sakura-petals.js}"></script>
</body>
</html>
