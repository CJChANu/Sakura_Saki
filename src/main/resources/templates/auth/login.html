<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sakura Saki</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link th:href="@{/css/admin-style.css}" rel="stylesheet">
</head>
<body>
<canvas id="sakura-canvas"></canvas>

<div class="auth-container">
    <div class="auth-card">

        <div class="auth-brand">
            <h1>🌸 Sakura Saki</h1>
            <p>Beauty & Wellness</p>
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue</p>

        <!-- Error message -->
        <div th:if="${param.error}" class="sakura-alert sakura-alert-error">
            <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 1rem;">error</span>
            Invalid username or password.
        </div>

        <!-- Success message -->
        <div th:if="${success}" class="sakura-alert sakura-alert-success" th:text="${success}"></div>

        <form th:action="@{/do-login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" class="input-recessed" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" class="input-recessed" placeholder="Enter your password" required>
            </div>
            <button class="btn-sakura btn-sakura-primary" type="submit" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
                <span class="material-symbols-outlined" style="font-size: 1rem;">login</span>
                Sign In
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--outline);">
            New here?
            <a th:href="@{/register}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create an account</a>
        </p>
    </div>
</div>

<script th:src="@{/js/sakura-petals.js}"></script>
</body>
</html>
