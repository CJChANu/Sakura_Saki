<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sakura Saki</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link th:href="@{/css/admin-style.css}" rel="stylesheet">
</head>
<body style="display:flex;flex-direction:column;min-height:100vh;">
<canvas id="sakura-canvas"></canvas>

<main style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;">
<div class="auth-container" style="min-height:auto;">
    <div class="auth-card">
        <div class="auth-brand">
            <h1>🌸 Sakura Saki</h1>
            <p>Experience Digital Serenity</p>
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue</p>

        <div th:if="${param.error}" class="sakura-alert sakura-alert-error">
            <span class="material-symbols-outlined" style="vertical-align:middle;font-size:1rem;">error</span>
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="sakura-alert sakura-alert-success">
            You have been logged out successfully.
        </div>
        <div th:if="${success}" class="sakura-alert sakura-alert-success" th:text="${success}"></div>

        <form th:action="@{/do-login}" method="post">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input id="username" name="username" type="text" class="input-recessed" placeholder="Enter your username or email" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" class="input-recessed" placeholder="Enter your password" required>
            </div>
            <button class="btn-sakura btn-sakura-primary" type="submit" style="width:100%;justify-content:center;margin-top:.5rem;">
                <span class="material-symbols-outlined" style="font-size:1rem;">login</span> Sign In
            </button>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--outline);">
            New here? <a th:href="@{/register}" style="color:var(--primary);font-weight:600;text-decoration:none;">Create an account</a>
        </p>

        <p style="text-align:center;margin-top:.5rem;">
            <a th:href="@{/}" style="font-size:.8rem;color:var(--outline);text-decoration:none;">← Back to Home</a>
        </p>
    </div>
</div>
</main>

<footer class="site-footer">
    <span>© 2024 SAKURA SAKI BEAUTY & WELLNESS. ALL RIGHTS RESERVED. · DEVELOPED BY CJCC & YAKA LABS</span>
</footer>

<script th:src="@{/js/sakura-petals.js}"></script>
</body>
</html>
