<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero-section small-hero">
    <video autoplay muted loop playsinline class="hero-video">
        <source th:src="@{/videos/29920-383980356.mp4}" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div class="container hero-content">
        <div class="hero-badge">Admin Service Creation</div>
        <h1 class="hero-title">Add New <span>Service</span></h1>
        <p class="hero-subtitle">
            Create a new salon service with category, price, duration, and availability details.
        </p>
    </div>
</section>

<section class="reviews-section pt-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="review-card">
                    <h2 class="section-title mb-4">Service Information</h2>

                    <form th:action="@{/services/add}" th:object="${service}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Service ID</label>
                                <input type="text" class="form-control" th:field="*{serviceId}" placeholder="Enter service ID" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Service Name</label>
                                <input type="text" class="form-control" th:field="*{serviceName}" placeholder="Enter service name" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Category</label>
                                <select class="form-select" th:field="*{category}" required>
                                    <option value="">Select category</option>
                                    <option value="Hair">Hair</option>
                                    <option value="Skin">Skin</option>
                                    <option value="Nail">Nail</option>
                                    <option value="Makeup">Makeup</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Duration (Minutes)</label>
                                <input type="number" class="form-control" th:field="*{duration}" placeholder="Enter duration" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Price</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{price}" placeholder="Enter price" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Availability</label>
                                <select class="form-select" th:field="*{available}">
                                    <option th:value="true">Available</option>
                                    <option th:value="false">Not Available</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Enter service description"></textarea>
                        </div>

                        <div class="d-flex justify-content-center gap-3 flex-wrap">
                            <a th:href="@{/services}" class="btn btn-outline-secondary">Back</a>
                            <button type="submit" class="btn btn-primary">Save Service</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{layout/fragments :: site-footer}"></footer>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
