<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Package Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero-section small-hero">
    <video autoplay muted loop playsinline class="hero-video">
        <source th:src="@{/videos/29920-383980356.mp4}" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div class="container hero-content">
        <div class="hero-badge">Admin Package Control</div>
        <h1 class="hero-title">Manage <span>Packages</span></h1>
        <p class="hero-subtitle">Create and update salon packages with the same premium theme.</p>

        <div class="hero-buttons d-flex justify-content-center gap-3 flex-wrap">
            <a th:href="@{/packages/add}" class="btn btn-primary">Add Package</a>
            <a th:href="@{/services}" class="btn btn-outline-light">Manage Services</a>
        </div>
    </div>
</section>

<section class="reviews-section pt-5">
    <div class="container">
        <div class="table-responsive">
            <table class="table table-hover align-middle bg-white rounded-4 overflow-hidden">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Included Services</th>
                    <th>Total Price</th>
                    <th>Discount</th>
                    <th>Final Price</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="pkg : ${packages}">
                    <td th:text="${pkg.packageId}"></td>
                    <td th:text="${pkg.packageName}"></td>
                    <td th:text="${pkg.includedServices}"></td>
                    <td th:text="'Rs. ' + ${pkg.totalPrice}"></td>
                    <td th:text="'Rs. ' + ${pkg.discount}"></td>
                    <td th:text="'Rs. ' + ${pkg.finalPrice}"></td>
                    <td th:text="${pkg.description}"></td>
                    <td>
                        <a class="btn btn-warning btn-sm me-1"
                           th:href="@{/packages/edit/{id}(id=${pkg.packageId})}">Edit</a>
                        <a class="btn btn-danger btn-sm"
                           th:href="@{/packages/delete/{id}(id=${pkg.packageId})}">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<footer th:replace="~{layout/fragments :: site-footer}"></footer>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
