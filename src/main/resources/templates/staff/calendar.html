<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{layout/fragments :: head('Calendar — Sakura Saki')}"></th:block>
    <!-- FullCalendar CDN -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body class="bg-background text-on-surface font-body">
<th:block th:replace="~{layout/fragments :: sakura-canvas}" />

<div class="flex min-h-screen w-full relative z-10 md:pl-72">
    <aside th:replace="~{layout/fragments :: staff-sidebar('calendar')}"></aside>

    <main class="flex-1 p-6 md:p-10 lg:p-14 relative flex flex-col">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h2 class="font-headline text-3xl md:text-4xl text-tertiary tracking-tight font-bold">My Calendar</h2>
                <p class="font-body text-on-surface-variant mt-2">Manage your upcoming appointments and availability.</p>
            </div>
            <!-- Toggle & Controls -->
            <div class="flex items-center space-x-4 bg-surface-container-lowest rounded-full p-1 shadow-sm border border-outline-variant/20">
                <button class="px-6 py-2 rounded-full bg-primary text-on-primary font-label text-sm uppercase tracking-wider transition-all duration-300 shadow-sm">Monthly</button>
                <button class="px-6 py-2 rounded-full text-tertiary hover:text-primary font-label text-sm uppercase tracking-wider transition-all duration-300">Weekly</button>
            </div>
        </header>

        <!-- Calendar Grid (Bento/Glassmorphic Style) -->
        <div class="glass-pane rounded-[2rem] p-6 shadow-[0_20px_40px_-15px_rgba(26,28,28,0.05)] overflow-hidden relative border border-outline-variant/15">
            <!-- Background Subtle Graphic -->
            <div class="absolute -right-20 -top-20 w-64 h-64 bg-gradient-to-br from-primary-container to-transparent rounded-full blur-3xl opacity-40 pointer-events-none"></div>
            
            <!-- Calendar Header Navigation -->
            <div class="flex justify-between items-center mb-6 relative z-10">
                <button id="prevMonthBtn" class="p-2 rounded-full hover:bg-surface-container-high transition-colors flex items-center justify-center">
                    <span class="material-symbols-outlined text-tertiary">chevron_left</span>
                </button>
                <h2 id="currentMonthYear" class="font-headline text-2xl font-bold text-on-surface">Month Year</h2>
                <div class="flex gap-2">
                    <button id="todayBtn" class="px-4 py-1.5 rounded-full hover:bg-surface-container-high text-sm font-label text-tertiary transition-colors border border-outline-variant/20">Today</button>
                    <button id="nextMonthBtn" class="p-2 rounded-full hover:bg-surface-container-high transition-colors flex items-center justify-center">
                        <span class="material-symbols-outlined text-tertiary">chevron_right</span>
                    </button>
                </div>
            </div>

            <!-- Calendar Header Days -->
            <div class="grid grid-cols-7 gap-4 mb-4 text-center relative z-10">
                <div class="font-label text-xs uppercase tracking-widest text-tertiary">Sun</div>
                <div class="font-label text-xs uppercase tracking-widest text-tertiary">Mon</div>
                <div class="font-label text-xs uppercase tracking-widest text-tertiary">Tue</div>
                <div class="font-label text-xs uppercase tracking-widest text-tertiary">Wed</div>
                <div class="font-label text-xs uppercase tracking-widest text-tertiary">Thu</div>
                <div class="font-label text-xs uppercase tracking-widest text-tertiary">Fri</div>
                <div class="font-label text-xs uppercase tracking-widest text-tertiary">Sat</div>
            </div>

            <!-- Calendar Cells -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-3 md:gap-4 h-[600px] relative z-10 auto-rows-fr">
                 <!-- Generated via JS -->
            </div>
        </div>

        
    </main>
</div>

<footer th:replace="~{layout/fragments :: dashboard-footer}"></footer>

<th:block th:replace="~{layout/fragments :: sakura-js}" />

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const rawAppointments = /*[[${appointments}]]*/ [];
        console.log("Raw Appointments:", rawAppointments);
        
        // Group appointments by date string "YYYY-MM-DD"
        const appointmentsByDate = {};
        if (rawAppointments) {
            rawAppointments.forEach(appt => {
                const dateKey = appt.appointmentDate; // e.g. "2026-07-03"
                if (!appointmentsByDate[dateKey]) {
                    appointmentsByDate[dateKey] = [];
                }
                appointmentsByDate[dateKey].push(appt);
            });
        }

        let currentDate = new Date(); // Start with current month/year
        
        const grid = document.getElementById('calendar-grid');
        const headerTitle = document.getElementById('currentMonthYear');
        
        function renderCalendar() {
            grid.innerHTML = ''; // Clear previous
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); // 0-indexed
            
            // Format header
            const monthName = new Intl.DateTimeFormat('en-US', { month: 'long' }).format(currentDate);
            headerTitle.textContent = `${monthName} ${year}`;
            
            // Calculate grid
            const firstDayOfMonth = new Date(year, month, 1);
            const startingDayOfWeek = firstDayOfMonth.getDay(); // 0 = Sun, 6 = Sat
            
            const lastDayOfMonth = new Date(year, month + 1, 0);
            const totalDays = lastDayOfMonth.getDate();
            
            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
            
            // Render dummy cells for padding at start of month
            for (let i = 0; i < startingDayOfWeek; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'rounded-xl bg-surface-container-low/30 min-h-[80px]';
                grid.appendChild(emptyCell);
            }
            
            // Render actual days
            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('div');
                const isToday = isCurrentMonth && day === today.getDate();
                
                // Format date string for lookup: YYYY-MM-DD
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayAppointments = appointmentsByDate[dateKey] || [];
                
                if (isToday) {
                    // Today Styling
                    cell.className = 'rounded-xl bg-primary-container/20 border border-primary/30 p-2 flex flex-col shadow-[inset_0_0_10px_rgba(255,183,197,0.2)] transition-all duration-300 min-h-[80px] overflow-hidden relative';
                    let contentHTML = `<span class="text-sm font-bold text-primary mb-1 flex items-center justify-between">
                            ${day} <span class="w-2 h-2 bg-primary rounded-full"></span>
                        </span>
                        <div class="flex flex-col gap-1 mt-auto overflow-y-auto" style="scrollbar-width: none;">`;
                        
                    dayAppointments.forEach(appt => {
                        const time = appt.appointmentTime.substring(0, 5); // "09:00"
                        const name = appt.service ? appt.service.name : "Appt";
                        
                        let bgColor = "bg-primary";
                        let textColor = "text-on-primary";
                        if (appt.status === 'COMPLETED') { bgColor = "bg-green-600"; textColor = "text-white"; }
                        if (appt.status === 'CANCELLED') { bgColor = "bg-red-600"; textColor = "text-white"; }
                        
                        contentHTML += `<div class="${bgColor} ${textColor} text-[10px] font-bold px-2 py-1 rounded-md truncate shadow-sm" title="${time} - ${name}">
                                ${time} - ${name}
                            </div>`;
                    });
                    
                    contentHTML += `</div>`;
                    cell.innerHTML = contentHTML;
                } else {
                    // Regular Day Styling
                    cell.className = 'rounded-xl bg-surface-container-lowest border border-outline-variant/15 p-2 flex flex-col hover:shadow-lg transition-all duration-300 min-h-[80px] overflow-hidden relative cursor-pointer hover:border-primary/30';
                    let contentHTML = `<span class="text-sm font-semibold text-tertiary mb-1">${day}</span>
                        <div class="flex flex-col gap-1 mt-auto overflow-y-auto" style="scrollbar-width: none;">`;
                        
                    dayAppointments.forEach(appt => {
                        const time = appt.appointmentTime.substring(0, 5);
                        const name = appt.service ? appt.service.name : "Appt";
                        
                        let bgColor = "bg-secondary-container";
                        let textColor = "text-on-secondary-container";
                        if (appt.status === 'COMPLETED') { bgColor = "bg-green-100"; textColor = "text-green-800"; }
                        if (appt.status === 'CANCELLED') { bgColor = "bg-red-100"; textColor = "text-red-800"; }
                        
                        contentHTML += `<div class="${bgColor} ${textColor} text-[10px] font-bold px-2 py-1 rounded-md truncate" title="${time} - ${name}">
                                ${time} - ${name}
                            </div>`;
                    });
                    
                    contentHTML += `</div>`;
                    cell.innerHTML = contentHTML;
                }
                
                grid.appendChild(cell);
            }
        }
        
        // Initial render
        renderCalendar();
        
        // Navigation events
        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });
        
        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });
        
        document.getElementById('todayBtn').addEventListener('click', () => {
            currentDate = new Date();
            renderCalendar();
        });
    });
</script>
</body>
</html>
