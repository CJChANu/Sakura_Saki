<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Package</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero-section small-hero">
    <video autoplay muted loop playsinline class="hero-video">
        <source th:src="@{/videos/29920-383980356.mp4}" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div class="container hero-content">
        <div class="hero-badge">Admin Package Update</div>
        <h1 class="hero-title">Edit <span>Package</span></h1>
        <p class="hero-subtitle">
            Update package details, pricing, discounts, and included salon services.
        </p>
    </div>
</section>

<section class="reviews-section pt-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="review-card">
                    <h2 class="section-title mb-4">Update Package Details</h2>

                    <form th:action="@{/packages/update}" th:object="${servicePackage}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Package ID</label>
                                <input type="text" class="form-control" th:field="*{packageId}" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Package Name</label>
                                <input type="text" class="form-control" th:field="*{packageName}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Included Services</label>
                            <input type="text" class="form-control" th:field="*{includedServices}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Total Price</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{totalPrice}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Discount</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{discount}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                        </div>

                        <div class="d-flex justify-content-center gap-3 flex-wrap">
                            <a th:href="@{/packages}" class="btn btn-outline-secondary">Back</a>
                            <button type="submit" class="btn btn-primary">Update Package</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
