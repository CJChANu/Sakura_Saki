<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(${pkg.name + ' - Sakura Saki'})}"></head>
<body class="bg-surface font-body text-on-surface antialiased">
<th:block th:replace="~{layout/fragments :: sakura-canvas}" />

<nav th:replace="~{layout/fragments :: topnav('services')}"></nav>

<main class="pt-32 px-6 max-w-6xl mx-auto relative z-10">
    <a th:href="@{/services}" class="inline-flex items-center gap-2 text-primary text-xs font-bold uppercase tracking-widest mb-10" style="text-decoration:none;">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Back to Services
    </a>

    <section class="grid lg:grid-cols-[1.1fr_.9fr] gap-12 items-start">
        <div class="bg-white rounded-lg p-8 md:p-12 clay-lift">
            <span class="font-label text-primary uppercase tracking-[0.18em] text-xs font-bold">Curated Package</span>
            <h1 class="font-headline text-4xl md:text-6xl font-bold mt-4 mb-6" th:text="${pkg.name}">Package Name</h1>
            <p class="text-on-surface-variant text-lg leading-relaxed mb-10" th:text="${pkg.description}">
                Package description
            </p>

            <div class="grid sm:grid-cols-3 gap-4">
                <div class="rounded-lg bg-surface-container-low p-5">
                    <span class="material-symbols-outlined text-primary">payments</span>
                    <p class="text-xs uppercase tracking-widest text-on-surface-variant mt-3">Price</p>
                    <p class="font-headline text-2xl font-bold text-primary" th:text="'Rs.' + ${#numbers.formatDecimal(pkg.discountedPrice,1,2)}">Rs.0</p>
                </div>
                <div class="rounded-lg bg-surface-container-low p-5">
                    <span class="material-symbols-outlined text-primary">schedule</span>
                    <p class="text-xs uppercase tracking-widest text-on-surface-variant mt-3">Duration</p>
                    <p class="font-headline text-2xl font-bold" th:text="${pkg.totalDuration} + ' min'">0 min</p>
                </div>
                <div class="rounded-lg bg-surface-container-low p-5">
                    <span class="material-symbols-outlined text-primary">local_offer</span>
                    <p class="text-xs uppercase tracking-widest text-on-surface-variant mt-3">Savings</p>
                    <p class="font-headline text-2xl font-bold" th:text="${pkg.discountPercent} + '%'">0%</p>
                </div>
            </div>
        </div>

        <aside class="bg-primary-container/20 rounded-lg p-8 clay-lift">
            <h2 class="font-headline text-2xl font-bold mb-6">Included Services</h2>
            <div class="space-y-4 mb-8">
                <div th:each="service : ${pkg.services}" class="bg-white rounded-lg p-5 flex justify-between gap-4">
                    <div>
                        <h3 class="font-bold" th:text="${service.name}">Service</h3>
                        <p class="text-sm text-on-surface-variant" th:text="${service.category ?: 'Beauty Ritual'}">Category</p>
                    </div>
                    <span class="text-primary text-sm font-bold shrink-0" th:text="${service.durationMinutes} + ' min'">0 min</span>
                </div>
            </div>

            <div class="flex items-center gap-3 mb-8">
                <span class="text-outline line-through" th:text="'Rs.' + ${#numbers.formatDecimal(pkg.totalPrice,1,2)}">Rs.0</span>
                <span class="text-2xl font-headline font-bold text-primary" th:text="'Rs.' + ${#numbers.formatDecimal(pkg.discountedPrice,1,2)}">Rs.0</span>
            </div>

            <a th:href="@{/booking(select='PKG_' + ${pkg.id})}" class="block w-full text-center bg-primary text-on-primary rounded-full py-4 font-label text-xs uppercase tracking-widest font-bold hover:scale-[1.02] transition-all" style="text-decoration:none;">
                Book This Package
            </a>
        </aside>
    </section>
</main>

<footer th:replace="~{layout/fragments :: site-footer}"></footer>
<th:block th:replace="~{layout/fragments :: sakura-js}" />
</body>
</html>
