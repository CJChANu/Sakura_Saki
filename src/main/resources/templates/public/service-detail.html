<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${service.name + ' — Sakura Saki'}">Service Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#ffd9df", "outline": "#837375", "error": "#ba1a1a",
                        "primary": "#864e5a", "inverse-primary": "#fbb3c1",
                        "surface-container-low": "#f3f3f3", "on-error": "#ffffff",
                        "surface-container": "#eeeeee", "on-primary-container": "#7b4551",
                        "background": "#f9f9f9", "on-background": "#1a1c1c",
                        "surface-container-highest": "#e2e2e2", "on-tertiary": "#ffffff",
                        "surface": "#f9f9f9", "tertiary": "#5f5e5e",
                        "surface-container-lowest": "#ffffff", "on-secondary": "#ffffff",
                        "error-container": "#ffdad6", "secondary": "#70585b",
                        "on-primary": "#ffffff", "primary-container": "#ffb7c5",
                        "on-surface": "#1a1c1c", "surface-container-high": "#e8e8e8",
                        "surface-variant": "#e2e2e2", "surface-bright": "#f9f9f9",
                        "on-surface-variant": "#514345", "outline-variant": "#d6c2c4"
                    },
                    "borderRadius": { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                    "fontFamily": { "headline": ["Noto Serif"], "body": ["Manrope"], "label": ["Manrope"] }
                }
            }
        }
    </script>
    <link th:href="@{/css/admin-style.css}" rel="stylesheet">
    <style>
        body{margin:0;font-family:var(--font-body);color:var(--on-surface);background:var(--surface);}
        .public-topnav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(255,255,255,.6);backdrop-filter:blur(24px);border-bottom:.5px solid rgba(214,194,196,.12);}
        .public-topnav .brand{font-family:var(--font-headline);font-size:1.15rem;font-weight:700;color:var(--primary);text-decoration:none;}
        .public-topnav .nav-links{display:flex;gap:2rem;align-items:center;}
        .public-topnav .nav-links a{font-family:var(--font-label);font-size:.8rem;font-weight:500;color:var(--on-surface-variant);text-decoration:none;transition:color .3s;}
        .public-topnav .nav-links a:hover{color:var(--primary);}
        .container{max-width:800px;margin:0 auto;padding:6rem 2rem 3rem;}
        .back-link{font-size:.85rem;color:var(--primary);text-decoration:none;display:inline-flex;align-items:center;gap:.25rem;margin-bottom:1.5rem;}
        .detail-card{background:rgba(255,255,255,.7);backdrop-filter:blur(16px);border-radius:var(--radius-lg);padding:2.5rem;border:.5px solid rgba(214,194,196,.12);margin-bottom:2rem;}
        .detail-card .cat{font-family:var(--font-label);font-size:.6rem;text-transform:uppercase;letter-spacing:.15em;color:var(--primary);margin-bottom:.5rem;}
        .detail-card h1{font-family:var(--font-headline);font-size:2rem;font-weight:700;margin:0 0 1rem;}
        .detail-card .desc{font-size:1rem;color:var(--on-surface-variant);line-height:1.7;margin-bottom:1.5rem;}
        .detail-meta{display:flex;gap:2rem;margin-bottom:2rem;}
        .detail-meta .item{text-align:center;padding:1rem 1.5rem;background:var(--surface-container-low);border-radius:var(--radius-default);}
        .detail-meta .item .val{font-family:var(--font-headline);font-size:1.5rem;font-weight:700;color:var(--primary);}
        .detail-meta .item .lbl{font-family:var(--font-label);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--outline);margin-top:.25rem;}
        .booking-section{background:#fff;border-radius:var(--radius-lg);padding:2rem;border:1px solid rgba(0,0,0,0.05);display:none;margin-top:2rem;}
        .booking-section.active{display:block;}
        .staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-top:1rem;}
        .staff-card{border:1px solid rgba(0,0,0,0.1);border-radius:var(--radius-default);padding:1rem;cursor:pointer;transition:all .2s;}
        .staff-card:hover{border-color:var(--primary);background:var(--primary-container);}
        .staff-card.selected{border-color:var(--primary);background:var(--primary);color:#fff;}
        .staff-card.selected .outline-text{color:rgba(255,255,255,0.8);}
        .outline-text{font-size:0.75rem;color:var(--outline);margin-top:0.25rem;}
        .review-card{background:rgba(255,255,255,.7);border-radius:var(--radius-default);padding:1.5rem;margin-bottom:1rem;border:.5px solid rgba(0,0,0,0.05);}
    </style>
</head>
<body style="display:flex;flex-direction:column;min-height:100vh;">
<canvas class="fixed inset-0 pointer-events-none w-full h-full -z-[1]" id="sakura-canvas"></canvas>

<main style="flex:1; position: relative; z-index: 1;">
<div th:replace="~{layout/fragments :: topnav('services')}"></div>

<div class="container">
    <a th:href="@{/services}" class="back-link"><span class="material-symbols-outlined" style="font-size:1rem;">arrow_back</span> Back to Services</a>
    
    <div class="detail-card">
        <div class="cat" th:text="${service.category ?: 'General'}">Category</div>
        <h1 th:text="${service.name}">Service Name</h1>
        <p class="desc" th:text="${service.description}">Description of the service.</p>
        <div class="detail-meta">
            <div class="item"><div class="val" th:text="'$' + ${#numbers.formatDecimal(service.price,1,0)}">$1500</div><div class="lbl">Price</div></div>
            <div class="item"><div class="val" th:text="${service.durationMinutes}">30</div><div class="lbl">Minutes</div></div>
            <div class="item" th:if="${avgRating != null and avgRating > 0}"><div class="val" style="color:#f59e0b;" th:text="${#numbers.formatDecimal(avgRating,1,1)}">4.5</div><div class="lbl">Rating</div></div>
        </div>
        
        <div style="display:flex;gap:1rem;">
            <button th:if="${isLoggedIn and !isStaff}" onclick="toggleBooking()" class="btn-sakura btn-sakura-primary" style="padding:.75rem 2rem;">
                <span class="material-symbols-outlined" style="font-size:1rem;">calendar_add_on</span> Book This Service
            </button>
            <a th:if="${!isLoggedIn}" th:href="@{/login}" class="btn-sakura btn-sakura-primary" style="padding:.75rem 2rem;">
                Sign in to Book
            </a>
        </div>
    </div>
    
    <!-- Inline Booking Form -->
    <div id="bookingSection" class="booking-section" th:if="${isLoggedIn and !isStaff}">
        <h2 style="font-family:var(--font-headline);margin:0 0 1.5rem;font-size:1.5rem;">Schedule Appointment</h2>
        <form th:action="@{/booking}" method="post" id="bookingForm">
            <input type="hidden" name="serviceId" th:value="${service.id}">
            <input type="hidden" name="staffId" id="selectedStaffId" value="">
            <input type="hidden" name="returnTo" th:value="'/services/' + ${service.id}">
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
                <div class="form-group">
                    <label for="bookingDate">Date</label>
                    <input type="date" id="bookingDate" name="date" class="input-recessed" required>
                </div>
                <div class="form-group">
                    <label for="bookingTime">Time</label>
                    <input type="time" id="bookingTime" name="time" class="input-recessed" required>
                </div>
            </div>

            <div class="form-group" style="margin-bottom:1.5rem;">
                <label>Select Staff Member</label>
                <div class="staff-grid" id="staffList">
                    <p style="color:var(--outline);grid-column:1/-1;">Please select a date and time to see available staff.</p>
                </div>
            </div>

            <div class="form-group" style="margin-bottom:1.5rem;">
                <label>Notes (optional)</label>
                <textarea name="notes" class="input-recessed" rows="2" placeholder="Any special requests..."></textarea>
            </div>
            
            <button type="submit" id="submitBookingBtn" class="btn-sakura btn-sakura-primary" style="width:100%;justify-content:center;opacity:0.5;cursor:not-allowed;" disabled>
                <span class="material-symbols-outlined" style="font-size:1rem;">calendar_add_on</span> Confirm Booking
            </button>
        </form>
    </div>
    
    <!-- Reviews Section -->
    <div th:if="${reviews != null and !reviews.isEmpty()}" style="margin-top:3rem;">
        <h3 style="font-family:var(--font-headline);font-size:1.25rem;margin-bottom:1.5rem;">Client Reviews</h3>
        <div th:each="r : ${reviews}" class="review-card">
            <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;">
                <div style="font-weight:600;" th:text="${r.customer.firstName + ' ' + r.customer.lastName}">Name</div>
                <div style="color:#f59e0b;font-size:.875rem;">
                    <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:text-bottom;" th:each="i : ${#numbers.sequence(1, 5)}" th:text="${i <= r.rating ? 'star' : 'star_border'}">star</span>
                </div>
            </div>
            <p style="margin:0;font-size:.9rem;color:var(--on-surface-variant);line-height:1.5;" th:text="${r.comment}">Comment</p>
            <div style="font-size:.7rem;color:var(--outline);margin-top:.5rem;text-transform:uppercase;letter-spacing:.05em;" th:text="${#temporals.format(r.createdAt, 'MMM dd, yyyy')}">Date</div>
        </div>
    </div>
</div>
</main>

<footer th:replace="~{layout/fragments :: site-footer}"></footer>

<script th:src="@{/js/sakura-petals.js}"></script>
<script>
    function getLocalDateStr() {
        var d = new Date();
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
    }
    function getCurrentTimeStr() {
        var d = new Date();
        return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    document.addEventListener('DOMContentLoaded', function() {
        var dateInput = document.getElementById('bookingDate');
        var timeInput = document.getElementById('bookingTime');
        var form = document.getElementById('bookingForm');

        if (dateInput) {
            dateInput.setAttribute('min', getLocalDateStr());
        }

        // Validate on form submission
        if (form) {
            form.addEventListener('submit', function(e) {
                var selectedDate = dateInput ? dateInput.value : '';
                var selectedTime = timeInput ? timeInput.value : '';
                var today = getLocalDateStr();

                if (!selectedDate || !selectedTime) return;

                if (selectedDate < today) {
                    e.preventDefault();
                    showTimeError('Cannot book on a past date. Please select today or a future date.');
                    return;
                }

                if (selectedDate === today && selectedTime <= getCurrentTimeStr()) {
                    e.preventDefault();
                    showTimeError('The selected time has already passed. Please choose a later time for today.');
                    return;
                }

                // Check staff selected
                var staffId = document.getElementById('selectedStaffId');
                if (staffId && !staffId.value) {
                    e.preventDefault();
                    showTimeError('Please select a staff member before booking.');
                    return;
                }
            });
        }

        // Validate when time changes
        if (timeInput) {
            timeInput.addEventListener('change', function() {
                var today = getLocalDateStr();
                if (dateInput && dateInput.value === today && this.value && this.value <= getCurrentTimeStr()) {
                    showTimeError('The selected time has already passed. Please choose a later time for today.');
                    this.value = '';
                } else {
                    clearTimeError();
                    loadAvailableStaff();
                }
            });
        }

        // Revalidate time when date changes
        if (dateInput) {
            dateInput.addEventListener('change', function() {
                clearTimeError();
                var today = getLocalDateStr();
                if (this.value === today && timeInput && timeInput.value && timeInput.value <= getCurrentTimeStr()) {
                    timeInput.value = '';
                    showTimeError('The selected time has already passed. Please choose a later time for today.');
                } else {
                    loadAvailableStaff();
                }
            });
        }
    });

    async function loadAvailableStaff() {
        var dateInput = document.getElementById('bookingDate');
        var timeInput = document.getElementById('bookingTime');
        var duration = document.querySelector('div.detail-meta .item:nth-child(2) .val').textContent.trim() || '60';
        
        if (!dateInput.value || !timeInput.value) return;

        var container = document.getElementById('staffList');
        container.innerHTML = '<p style="color:var(--outline);grid-column:1/-1;">Loading available staff...</p>';
        document.getElementById('selectedStaffId').value = '';
        document.getElementById('submitBookingBtn').disabled = true;
        document.getElementById('submitBookingBtn').style.opacity = '0.5';
        document.getElementById('submitBookingBtn').style.cursor = 'not-allowed';

        try {
            const resp = await fetch(`/booking/available-staff?date=${dateInput.value}&time=${timeInput.value}&durationMinutes=${duration}`);
            const staffList = await resp.json();

            container.innerHTML = '';
            
            if (staffList.length === 0) {
                container.innerHTML = '<p style="color:var(--outline);grid-column:1/-1;">No staff available at this time. Please try a different slot.</p>';
                return;
            }

            staffList.forEach(s => {
                const card = document.createElement('div');
                card.className = 'staff-card';
                card.setAttribute('data-id', s.id);
                card.onclick = function() { selectStaff(this); };
                card.innerHTML = `
                    <div style="font-weight:600;">${s.firstName} ${s.lastName}</div>
                    <div class="outline-text">${s.specialization || s.staffType || ''}</div>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = '<p style="color:var(--error);grid-column:1/-1;">Error loading staff. Please try again later.</p>';
        }
    }

    function showTimeError(msg) {
        clearTimeError();
        var err = document.createElement('div');
        err.className = 'sakura-alert sakura-alert-error';
        err.id = 'time-validation-error';
        err.textContent = msg;
        var section = document.getElementById('bookingSection');
        if (section) section.insertBefore(err, section.firstChild);
        err.scrollIntoView({behavior: 'smooth', block: 'center'});
    }
    function clearTimeError() {
        var existing = document.getElementById('time-validation-error');
        if (existing) existing.remove();
    }

    function toggleBooking() {
        var sec = document.getElementById('bookingSection');
        if (sec) {
            sec.classList.toggle('active');
            if (sec.classList.contains('active')) {
                sec.scrollIntoView({behavior: 'smooth', block: 'center'});
            }
        }
    }
    
    function selectStaff(card) {
        document.querySelectorAll('.staff-card').forEach(function(c) { c.classList.remove('selected'); });
        card.classList.add('selected');
        document.getElementById('selectedStaffId').value = card.getAttribute('data-id');
        var btn = document.getElementById('submitBookingBtn');
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
    }
</script>
</body>
</html>
